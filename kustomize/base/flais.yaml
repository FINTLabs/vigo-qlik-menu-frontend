apiVersion: fintlabs.no/v1alpha1
kind: Application
metadata:
  name: novari-analyse-menu-frontend
  namespace: fintlabs-no
spec:
  port: 8080
  imagePullPolicy: Always
  imagePullSecrets:
    - ghcr
  replicas: 1
  orgId: fintlabs.no
  image: ghcr.io/fintlabs/novari-analyse-menu-frontend:latest
  env: []
  ingress:
    routes:
      - host: "example.fintlabs.no"
        path: "/cluster/url"
  resources:
    limits:
      memory: "512Mi"
      cpu: "1"
    requests:
      memory: "128Mi"
      cpu: "100m"